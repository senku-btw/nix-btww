# ==============================================================================
# MANGO WINDOW MANAGER (MangoWM) DEFAULT CONFIGURATION
# ==============================================================================

env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_TYPE,wayland
env=QT_QPA_PLATFORM,wayland
env=GDK_BACKEND,wayland,x11

gappih=6
gappoh=6
borderpx=3

focuscolor=0xc9b890ff
unfocuscolor=0x444444ff

blur=1
shadows=1
border_radius=8
focused_opacity=1.0
unfocused_opacity=0.85

animations=1
animation_type_open=slide
animation_duration_open=400
animation_type_close=fade
animation_duration_close=300

xkb_rules_layout=us
repeat_rate=25
repeat_delay=600

tap_to_click=1
mouse_natural_scrolling=0
click_method=2

keymode=common
bind=SUPER,r,reload_config    

keymode=default
# Command to launch apps
bind=SUPER,Return,spawn,foot           
bind=SUPER,space,spawn,bemenu-run
bind=SUPER,q,killclient                  
bind=SUPER,m,quit                       

# Option + Arrow keys to navigate windows
bind=ALT,Left,movefocus,l
bind=ALT,Right,movefocus,r
bind=ALT,Up,movefocus,u
bind=ALT,Down,movefocus,d

bind=SUPER,f,toggle_fullscreen
bind=ALT,Backslash,toggle_floating

# Command + [1-5] to jump to workspaces
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5

bind=SUPER+SHIFT,1,movewindowtotag,1
bind=SUPER+SHIFT,2,movewindowtotag,2
bind=SUPER+SHIFT,3,movewindowtotag,3
bind=SUPER+SHIFT,4,movewindowtotag,4
bind=SUPER+SHIFT,5,movewindowtotag,5

bind=SUPER,space,nextlayout
