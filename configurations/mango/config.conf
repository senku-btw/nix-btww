# ==============================================================================
# MANGO WINDOW MANAGER (MangoWM) DEFAULT CONFIGURATION
# Location: configurations/mango/config.conf
# ==============================================================================

env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_TYPE,wayland
env=QT_QPA_PLATFORM,wayland
env=GDK_BACKEND,wayland,x11

gappih=6
gappoh=6
borderpx=3

focuscolor=0xc9b890ff
unfocuscolor=0x444444ff

blur=1
shadows=1
border_radius=8
focused_opacity=1.0
unfocused_opacity=0.85

animations=1
animation_type_open=slide
animation_duration_open=400
animation_type_close=fade
animation_duration_close=300

xkb_rules_layout=us
repeat_rate=25
repeat_delay=600

tap_to_click=1
mouse_natural_scrolling=0
click_method=2

# Global Shortcuts
bind=ALT,r,reload_config    
bind=ALT,m,quit                       

# --- APP LAUNCHING (Command Key) ---
bind=ALT,Return,spawn,foot           
bind=ALT,space,spawn,bemenu-run
bind=ALT,q,killclient                  

# --- WINDOW FOCUS & MOVEMENT (Command + Shift) ---
bind=ALT+SHIFT,Left,movefocus,l
bind=ALT+SHIFT,Right,movefocus,r
bind=ALT+SHIFT,Up,movefocus,u
bind=ALT+SHIFT,Down,movefocus,d

# Changed to Command + Shift + F so Chrome/Firefox cannot hijack it
bind=ALT+SHIFT,f,toggle_fullscreen
bind=ALT,Backslash,toggle_floating
bind=ALT,Tab,nextlayout

# --- WORKSPACE SWITCHING (Command + [1-5]) ---
# Changed from SUPER to ALT so your actual Command key switches tags
bind=ALT,1,view,1
bind=ALT,2,view,2
bind=ALT,3,view,3
bind=ALT,4,view,4
bind=ALT,5,view,5

# Move active window to a workspace using Command + Control + [1-5]
bind=ALT+CTRL,1,movewindowtotag,1
bind=ALT+CTRL,2,movewindowtotag,2
bind=ALT+CTRL,3,movewindowtotag,3
bind=ALT+CTRL,4,movewindowtotag,4
bind=ALT+CTRL,5,movewindowtotag,5

tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:monocle
tagrule=id:4,layout_name:grid

monitorrule=name:HDMI-A-1,width:2560,height:1440,refresh:60,x:0,y:0
monitorrule=name:DP-1,width:2560,height:1440,refresh:60,x:0,y:1440
