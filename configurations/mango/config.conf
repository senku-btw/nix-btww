# ==============================================================================
# MANGO WINDOW MANAGER (MangoWM) DEFAULT CONFIGURATION
# Location: configurations/mango/config.conf
# ==============================================================================

env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_TYPE,wayland
env=QT_QPA_PLATFORM,wayland
env=GDK_BACKEND,wayland,x11

gappih=6
gappoh=6
borderpx=3

focuscolor=0xc9b890ff
unfocuscolor=0x444444ff

blur=1
shadows=1
border_radius=8
focused_opacity=1.0
unfocused_opacity=0.85

animations=1
animation_type_open=slide
animation_duration_open=400
animation_type_close=fade
animation_duration_close=300

xkb_rules_layout=us
repeat_rate=25
repeat_delay=600

tap_to_click=1
mouse_natural_scrolling=0
click_method=2

# Global Actions
bind=ALT,r,reload_config    
bind=ALT,m,quit                       

# --- APP LAUNCHING (Physical Command Key -> ALT) ---
bind=ALT,Return,spawn,foot           
bind=ALT,space,spawn,bemenu-run
bind=ALT,q,killclient                  

# --- WINDOW FOCUS & MOVEMENT (Physical Option Key -> SUPER) ---
bind=SUPER,Left,movefocus,l
bind=SUPER,Right,movefocus,r
bind=SUPER,Up,movefocus,u
bind=SUPER,Down,movefocus,d

# Fullscreen and float controls bound cleanly to your Option Key (SUPER)
bind=SUPER,f,toggle_fullscreen
bind=SUPER,Backslash,toggle_floating
bind=SUPER,Tab,nextlayout

# --- TAGS & WORKSPACES (Physical Option Key -> SUPER) ---
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5

bind=SUPER+SHIFT,1,movewindowtotag,1
bind=SUPER+SHIFT,2,movewindowtotag,2
bind=SUPER+SHIFT,3,movewindowtotag,3
bind=SUPER+SHIFT,4,movewindowtotag,4
bind=SUPER+SHIFT,5,movewindowtotag,5

tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:monocle
tagrule=id:4,layout_name:grid

monitorrule=name:HDMI-A-1,width:2560,height:1440,refresh:60,x:0,y:0
monitorrule=name:DP-1,width:2560,height:1440,refresh:60,x:0,y:1440
